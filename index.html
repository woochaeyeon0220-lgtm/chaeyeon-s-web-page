<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채연's web page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF69B4;
    --hot-pink: #FF1493;
    --mint: #B5EAE0;
    --light-mint: #D6F5EF;
    --dark-mint: #7DCFC0;
    --white: #FFFFFF;
    --dot-size: 18px;
    --dot-gap: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background-color: var(--light-mint);
    background-image: radial-gradient(circle, var(--pink) 5px, transparent 5px);
    background-size: var(--dot-gap) var(--dot-gap);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    padding: 40px 20px 32px;
  }

  header h1 {
    font-family: 'Jua', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--hot-pink);
    text-shadow: 3px 3px 0 var(--white), 5px 5px 0 rgba(255,20,147,0.2);
    letter-spacing: -1px;
    line-height: 1.2;
  }

  header .fish {
    font-size: 2.6rem;
    display: inline-block;
    animation: wobble 2s ease-in-out infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
  }

  .subtitle {
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--dark-mint);
    background: var(--white);
    display: inline-block;
    padding: 4px 16px;
    border-radius: 999px;
    border: 2px solid var(--pink);
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    border: 3px solid var(--pink);
    padding: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 6px 6px 0 var(--pink);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 var(--hot-pink);
  }

  .card::before {
    content: '';
    position: absolute;
    top: -10px; right: -10px;
    width: 60px; height: 60px;
    background: var(--light-mint);
    border-radius: 50%;
    border: 3px solid var(--pink);
  }

  .card-title {
    font-family: 'Jua', sans-serif;
    font-size: 1.3rem;
    color: var(--hot-pink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .badge {
    font-size: 0.7rem;
    background: var(--pink);
    color: white;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
  }

  /* 날씨 */
  #weather-content { min-height: 100px; }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .weather-icon { font-size: 3.5rem; }
  .weather-temp {
    font-family: 'Jua', sans-serif;
    font-size: 2.8rem;
    color: var(--hot-pink);
  }
  .weather-desc { font-size: 1rem; color: #888; margin-top: 2px; }
  .weather-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .weather-detail-item {
    background: var(--light-mint);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 0.82rem;
    color: #555;
  }
  .weather-detail-item span {
    display: block;
    font-weight: 700;
    color: var(--hot-pink);
    font-size: 1rem;
  }

  /* 뉴스 공통 */
  .news-list { list-style: none; }
  .news-list li {
    padding: 10px 0;
    border-bottom: 1.5px dashed var(--mint);
    font-size: 0.88rem;
    line-height: 1.5;
    color: #444;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    cursor: pointer;
    transition: color 0.15s;
  }
  .news-list li:last-child { border-bottom: none; }
  .news-list li:hover { color: var(--hot-pink); }
  .news-list li::before {
    content: '🌸';
    flex-shrink: 0;
    font-size: 0.85rem;
    margin-top: 1px;
  }
  .news-source {
    font-size: 0.75rem;
    color: #bbb;
    display: block;
    margin-top: 2px;
  }

  /* 통계 */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-item {
    background: linear-gradient(135deg, var(--light-mint), white);
    border: 2px solid var(--mint);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    color: var(--hot-pink);
    display: block;
  }
  .stat-label {
    font-size: 0.75rem;
    color: #888;
    margin-top: 2px;
  }
  .stat-note {
    font-size: 0.78rem;
    color: #aaa;
    text-align: right;
    margin-top: 4px;
  }

  .loading {
    text-align: center;
    padding: 20px;
    color: var(--pink);
    font-family: 'Jua', sans-serif;
    font-size: 1rem;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error-msg {
    color: #ccc;
    font-size: 0.85rem;
    text-align: center;
    padding: 12px;
  }

  .update-time {
    font-size: 0.72rem;
    color: #bbb;
    text-align: right;
    margin-top: 10px;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.8rem;
    color: var(--dark-mint);
    font-weight: 700;
  }
  footer span {
    background: white;
    border: 2px solid var(--pink);
    border-radius: 999px;
    padding: 6px 20px;
    display: inline-block;
  }
</style>
</head>
<body>

<header>
  <div class="fish">🐟</div>
  <h1>채연's web page</h1>
  <div class="subtitle" id="current-date">로딩 중...</div>
</header>

<div class="grid">

  <!-- 날씨 카드 -->
  <div class="card">
    <div class="card-title">
      ☁️ 부산 날씨
      <span class="badge">LIVE</span>
    </div>
    <div id="weather-content">
      <div class="loading">날씨 불러오는 중... 🌸</div>
    </div>
    <div class="update-time" id="weather-time"></div>
  </div>

  <!-- 부산 이슈 -->
  <div class="card">
    <div class="card-title">
      📰 부산 이슈
      <span class="badge">NEWS</span>
    </div>
    <div id="busan-news">
      <div class="loading">뉴스 가져오는 중... 🌸</div>
    </div>
    <div class="update-time" id="busan-time"></div>
  </div>

  <!-- 부경대 뉴스 -->
  <div class="card">
    <div class="card-title">
      🎓 부경대 소식
      <span class="badge">PKNU</span>
    </div>
    <div id="pknu-news">
      <div class="loading">소식 불러오는 중... 🌸</div>
    </div>
    <div class="update-time" id="pknu-time"></div>
  </div>

  <!-- 사회복지 통계 -->
  <div class="card">
    <div class="card-title">
      💗 사회복지 통계
      <span class="badge">DATA</span>
    </div>
    <div id="welfare-stats">
      <div class="loading">통계 불러오는 중... 🌸</div>
    </div>
    <div class="update-time" id="welfare-time"></div>
  </div>

</div>

<footer>
  <span>🍦 채연's web page · Made with 💕</span>
</footer>

<script>
const CLAUDE_API = "https://api.anthropic.com/v1/messages";

function now() {
  return new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}

function setDate() {
  const d = new Date();
  const el = document.getElementById('current-date');
  el.textContent = d.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
}

async function callClaude(prompt, useSearch) {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }]
  };
  if (useSearch) {
    body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  }
  const res = await fetch(CLAUDE_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("API error " + res.status);
  const data = await res.json();
  return data.content.map(b => b.type === "text" ? b.text : "").filter(Boolean).join("\n");
}

/* 날씨 */
async function loadWeather() {
  try {
    const text = await callClaude(
      `부산시의 현재 날씨를 검색해서 아래 JSON 형식으로만 응답해줘. 마크다운 없이 JSON만 출력해.
{
  "temp": "숫자만(°C)",
  "feel": "체감온도 숫자",
  "desc": "날씨설명(맑음/흐림 등)",
  "icon": "날씨에 맞는 이모지 1개",
  "humidity": "습도%",
  "wind": "풍속 m/s",
  "high": "최고기온",
  "low": "최저기온"
}`, true);
    const clean = text.replace(/```json|```/g, '').trim();
    const w = JSON.parse(clean);
    document.getElementById('weather-content').innerHTML = `
      <div class="weather-main">
        <div class="weather-icon">${w.icon}</div>
        <div>
          <div class="weather-temp">${w.temp}°C</div>
          <div class="weather-desc">${w.desc} · 체감 ${w.feel}°C</div>
        </div>
      </div>
      <div class="weather-details">
        <div class="weather-detail-item">습도<span>${w.humidity}</span></div>
        <div class="weather-detail-item">풍속<span>${w.wind}</span></div>
        <div class="weather-detail-item">최고<span>${w.high}°C</span></div>
        <div class="weather-detail-item">최저<span>${w.low}°C</span></div>
      </div>`;
    document.getElementById('weather-time').textContent = '🕐 ' + now() + ' 업데이트';
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="error-msg">날씨 정보를 불러올 수 없어요 😢<br>잠시 후 새로고침 해주세요</div>';
  }
}

/* 뉴스 공통 */
async function loadNews(prompt, elId, timeId) {
  try {
    const text = await callClaude(prompt, true);
    const clean = text.replace(/```json|```/g, '').trim();
    const items = JSON.parse(clean);
    const html = `<ul class="news-list">${items.map(n =>
      `<li onclick="window.open('${n.url||'#'}','_blank')">
        <div><div>${n.title}</div><span class="news-source">${n.source||''} · ${n.date||''}</span></div>
      </li>`).join('')}</ul>`;
    document.getElementById(elId).innerHTML = html;
    document.getElementById(timeId).textContent = '🕐 ' + now() + ' 업데이트';
  } catch(e) {
    document.getElementById(elId).innerHTML = '<div class="error-msg">뉴스를 불러올 수 없어요 😢</div>';
  }
}

/* 사회복지 통계 */
async function loadWelfare() {
  try {
    const text = await callClaude(
      `최신 한국 사회복지 관련 통계를 검색해서 아래 JSON 형식으로만 출력해줘. 마크다운 없이 JSON만.
[
  {"label": "통계명(짧게)", "value": "수치", "unit": "단위/연도"},
  {"label": "통계명", "value": "수치", "unit": "단위/연도"},
  {"label": "통계명", "value": "수치", "unit": "단위/연도"},
  {"label": "통계명", "value": "수치", "unit": "단위/연도"}
]
예: 기초수급자, 노인인구비율, 장애인등록수, 사회복지사수 등 주요 지표 4개`, true);
    const clean = text.replace(/```json|```/g, '').trim();
    const stats = JSON.parse(clean);
    document.getElementById('welfare-stats').innerHTML = `
      <div class="stat-grid">
        ${stats.map(s => `
          <div class="stat-item">
            <span class="stat-num">${s.value}</span>
            <div class="stat-label">${s.label}</div>
            <div style="font-size:0.7rem;color:#bbb;margin-top:2px">${s.unit}</div>
          </div>`).join('')}
      </div>
      <div class="stat-note">📊 출처: 보건복지부 · 통계청</div>`;
    document.getElementById('welfare-time').textContent = '🕐 ' + now() + ' 업데이트';
  } catch(e) {
    document.getElementById('welfare-stats').innerHTML = '<div class="error-msg">통계를 불러올 수 없어요 😢</div>';
  }
}

/* 실행 */
setDate();
loadWeather();
loadNews(
  `부산 관련 최신 뉴스 5개를 검색해서 아래 JSON 형식으로만 출력해. 마크다운 없이 JSON만.
[{"title":"제목","source":"언론사","date":"날짜","url":"링크"}]`,
  'busan-news', 'busan-time'
);
loadNews(
  `부경대학교(PKNU) 관련 최신 뉴스나 공지 5개를 검색해서 아래 JSON 형식으로만 출력해. 마크다운 없이 JSON만.
[{"title":"제목","source":"출처","date":"날짜","url":"링크"}]`,
  'pknu-news', 'pknu-time'
);
loadWelfare();
</script>
</body>
</html>
